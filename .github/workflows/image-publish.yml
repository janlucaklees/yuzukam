name: Build and Publish Docker Image

on:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:
  image-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Derive image tags
        id: image-tags
        run: |
          {
            echo 'tags<<EOF'
            echo 'ghcr.io/${{ github.repository_owner }}/yuzukam:latest'
            echo 'ghcr.io/${{ github.repository_owner }}/yuzukam:${{ github.sha }}'
            if [[ "${{ github.ref_type }}" == "tag" ]]; then
              echo 'ghcr.io/${{ github.repository_owner }}/yuzukam:${{ github.ref_name }}'
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/yuzukam:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/yuzukam:buildcache,mode=max
