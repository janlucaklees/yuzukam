name: Create GitHub Release From Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        id: tag-message
        run: |
          if ! printf '%s\n' "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z]+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid tag '${GITHUB_REF_NAME}': tags must match v<semver>." >&2
            exit 1
          fi

          tag_ref="refs/tags/${GITHUB_REF_NAME}"

          if ! git rev-parse --verify "$tag_ref" >/dev/null 2>&1; then
            echo "Tag '${tag_ref}' not found in local checkout." >&2
            exit 1
          fi

          tag_type="$(git cat-file -t "$tag_ref" 2>/dev/null || true)"

          if [[ -z "$tag_type" ]]; then
            echo "Invalid tag '${GITHUB_REF_NAME}': could not determine object type for '${tag_ref}'." >&2
            exit 1
          fi

          if [[ "$tag_type" != "tag" ]]; then
            echo "Invalid tag '${GITHUB_REF_NAME}': expected annotated tag, got '${tag_type}'." >&2
            exit 1
          fi

          tag_message="$(git cat-file tag "$tag_ref" | sed '1,/^$/d')"
          if [[ -z "$tag_message" ]]; then
            echo "Invalid tag '${GITHUB_REF_NAME}': annotated tags must include a non-empty message." >&2
            exit 1
          fi

          {
            echo 'body<<EOF'
            printf '%s\n' "$tag_message"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.tag-message.outputs.body }}
