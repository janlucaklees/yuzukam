name: Create GitHub Release From Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        id: tag-message
        run: |
          if ! printf '%s\n' "${GITHUB_REF_NAME}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z]+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid tag '${GITHUB_REF_NAME}': tags must match v<semver>." >&2
            exit 1
          fi

          tag_type="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(objecttype)')"
          if [[ "$tag_type" != "tag" ]]; then
            echo "Invalid tag '${GITHUB_REF_NAME}': tags must be annotated." >&2
            exit 1
          fi

          tag_message="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)')"
          if [[ -z "$tag_message" ]]; then
            echo "Invalid tag '${GITHUB_REF_NAME}': annotated tags must include a non-empty message." >&2
            exit 1
          fi

          {
            echo 'body<<EOF'
            printf '%s\n' "$tag_message"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.tag-message.outputs.body }}
